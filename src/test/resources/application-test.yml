spring:
  application:
    name: bibliokeep-backend

  datasource:
    url: jdbc:h2:mem:bibliokeep_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  access-token:
    secret: test-access-secret
  refresh-token:
    secret: test-refresh-secret

springdoc:
  api-docs:
    enabled: false

